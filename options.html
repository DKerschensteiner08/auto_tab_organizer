<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Tab Tidy (AI) - Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="container">
      <h1>Smart Tab Tidy (AI) Settings</h1>

      <section class="card">
        <h2>Similarity</h2>

        <label for="similarityMode">Similarity mode</label>
        <select id="similarityMode">
          <option value="local">Local similarity (TF-IDF)</option>
          <option value="embeddings">Embeddings API</option>
        </select>

        <label class="toggle">
          <input id="includeSnippet" type="checkbox" />
          <span>Include snippet text (optional)</span>
        </label>

        <label class="toggle">
          <input id="aiLabeling" type="checkbox" />
          <span>AI labeling (embeddings mode only)</span>
        </label>

        <label for="localThreshold">Local threshold: <span id="localThresholdValue">0.35</span></label>
        <input id="localThreshold" type="range" min="0.05" max="0.95" step="0.01" />

        <label for="embeddingsThreshold">Embeddings threshold: <span id="embeddingsThresholdValue">0.82</span></label>
        <input id="embeddingsThreshold" type="range" min="0.50" max="0.98" step="0.01" />
      </section>

      <section class="card" id="embeddingsCard">
        <h2>Embeddings API</h2>
        <p class="note warning">Tab titles and selected text may be sent to your chosen AI endpoint.</p>

        <label for="embeddingsEndpoint">Embeddings endpoint URL</label>
        <input id="embeddingsEndpoint" type="url" placeholder="https://api.example.com/embeddings" />

        <label for="embeddingsApiKey">API key</label>
        <input id="embeddingsApiKey" type="password" placeholder="Optional bearer token" autocomplete="off" />
      </section>

      <section class="card">
        <h2>Rules & Behavior</h2>

        <label for="excludedDomains">Excluded domains (one per line)</label>
        <textarea id="excludedDomains" rows="7" placeholder="example.com\nmail.example.com"></textarea>

        <label class="toggle">
          <input id="includePinned" type="checkbox" />
          <span>Include pinned tabs in grouping and AI grouping</span>
        </label>

        <label class="toggle">
          <input id="includeAudible" type="checkbox" />
          <span>Include audible tabs in parking</span>
        </label>

        <label for="parkingMode">Parking behavior</label>
        <select id="parkingMode">
          <option value="append">Create a new Parking Lot each time</option>
          <option value="replace">Reuse one Parking Lot (overwrite)</option>
        </select>
      </section>

      <section class="card">
        <h2>Automation</h2>
        <label for="autoAiGroupSchedule">Auto AI-group schedule</label>
        <select id="autoAiGroupSchedule">
          <option value="off">Off</option>
          <option value="30m">Every 30 min</option>
          <option value="2h">Every 2 hours</option>
          <option value="daily">Daily</option>
        </select>
      </section>

      <section class="actions">
        <button id="saveBtn" class="primary">Save Settings</button>
        <button id="clearSessionsBtn" class="danger">Clear saved sessions</button>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="options.js"></script>
  </body>
</html>
