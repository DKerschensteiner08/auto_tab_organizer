<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Tab Tidy (OpenAI AI) - Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="container">
      <h1>Smart Tab Tidy (OpenAI AI) Settings</h1>

      <section class="card">
        <h2>AI Grouping</h2>

        <label class="toggle">
          <input id="aiGroupingEnabled" type="checkbox" />
          <span>Enable AI grouping</span>
        </label>

        <label for="similarityThreshold">Similarity threshold: <span id="similarityThresholdValue">0.82</span></label>
        <input id="similarityThreshold" type="range" min="0.50" max="0.98" step="0.01" />

        <label class="toggle">
          <input id="includeSnippet" type="checkbox" />
          <span>Include snippet text (max 800 chars)</span>
        </label>

        <label for="openaiApiKey">OpenAI API key</label>
        <input id="openaiApiKey" type="password" placeholder="sk-..." autocomplete="off" />

        <label for="embeddingsModel">Embeddings model</label>
        <select id="embeddingsModel">
          <option value="text-embedding-3-small">text-embedding-3-small</option>
          <option value="text-embedding-3-large">text-embedding-3-large</option>
        </select>

        <label class="toggle">
          <input id="aiLabeling" type="checkbox" />
          <span>Optional AI labeling (Responses API)</span>
        </label>

        <p class="note">Tab titles and selected snippet text may be sent to OpenAI when AI grouping is used.</p>
      </section>

      <section class="card">
        <h2>Rules & Behavior</h2>

        <label for="excludedDomains">Excluded domains (one per line)</label>
        <textarea id="excludedDomains" rows="7" placeholder="example.com\nmail.example.com"></textarea>

        <label class="toggle">
          <input id="includePinned" type="checkbox" />
          <span>Include pinned tabs in grouping</span>
        </label>

        <label class="toggle">
          <input id="includeAudible" type="checkbox" />
          <span>Include audible tabs in parking</span>
        </label>

        <label for="parkingMode">Parking behavior</label>
        <select id="parkingMode">
          <option value="append">Create a new Parking Lot each time</option>
          <option value="replace">Reuse one Parking Lot (overwrite)</option>
        </select>
      </section>

      <section class="card">
        <h2>Automation</h2>

        <label for="autoAiGroupSchedule">Auto AI-group schedule</label>
        <select id="autoAiGroupSchedule">
          <option value="off">Off</option>
          <option value="30m">Every 30 min</option>
          <option value="2h">Every 2 hours</option>
          <option value="daily">Daily</option>
        </select>
      </section>

      <section class="actions">
        <button id="saveBtn" class="primary">Save Settings</button>
        <button id="clearSessionsBtn" class="danger">Clear saved sessions</button>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="options.js"></script>
  </body>
</html>
